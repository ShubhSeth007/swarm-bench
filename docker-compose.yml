version: "3.9"

services:
  swarm_bench:
    build: .
    container_name: swarm_bench_app
    ports:
      - "8501:8501"
    volumes:
      - .:/app          # Live-reload during development
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
